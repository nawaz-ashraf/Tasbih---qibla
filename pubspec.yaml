name: tasbih_qibla
description: A beautiful Islamic companion app with Tasbih counter and Qibla finder.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Neumorphic UI
  flutter_neumorphic_plus: ^3.3.0

  # Qibla & Compass
  flutter_qiblah: ^3.1.0+1
  sensors_plus: ^6.1.0
  adhan: ^2.0.0+1

  # Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0

  # Haptics & Vibration
  vibration: ^2.0.0
  wakelock_plus: ^1.2.1
  flutter_tts: ^4.0.2
  audioplayers: ^6.1.0
  google_mobile_ads: ^5.1.0

  # State Management
  provider: ^6.1.2

  # Local Storage (persist theme & last dhikr state)
  shared_preferences: ^2.3.2

  # Animations
  animate_do: ^3.3.4

  # Typography
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#252839"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  android_monochrome_image: "assets/images/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
